<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Error — Training Courses</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, sans-serif;
        color: #1a1a2e;
        background-color: #f5f7fa;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
      }
      .error-box {
        background: #fff;
        border-radius: 12px;
        padding: 3rem 2.5rem;
        text-align: center;
        max-width: 480px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      }
      .error-code {
        font-size: 4rem;
        font-weight: 700;
        color: #4361ee;
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      .error-box h1 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
        line-height: 1.2;
      }
      .error-box p {
        color: #555;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }
      .btn {
        display: inline-block;
        padding: 0.6rem 1.5rem;
        background-color: #4361ee;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        transition: opacity 0.15s ease;
      }
      .btn:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="error-box">
      <div class="error-code">Oops</div>
      <h1>We couldn't process that request</h1>
      <p>
        The request didn't go through. Double-check the link you followed, or
        head back to the course list and try again.
      </p>
      <a href="/" class="btn">Back to courses</a>
    </div>
  </body>
</html>
